<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川麻将 - 血战到底</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-info">
            <div class="player-info">玩家: <span id="player-score">0</span></div>
            <div class="round-info">剩余牌数: <span id="remaining-tiles">0</span></div>
            <div class="difficulty-info">
                AI难度:
                <select id="difficulty-select">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                </select>
            </div>
        </div>

        <!-- AI玩家3 (位置:上) -->
        <div class="ai-player ai-top">
            <div class="player-exposed" id="ai3-exposed"></div>
            <div class="ai-hand"></div>
            <div class="ai-name">玩家 3</div>
        </div>

        <!-- 游戏桌面 -->
        <div class="game-table">
            <div class="discarded-tiles">
                <div class="discarded-row top-row"></div>
                <div class="discarded-row middle-row"></div>
                <div class="discarded-row bottom-row"></div>
            </div>
        </div>

        <!-- AI玩家2 (位置:右) -->
        <div class="ai-player ai-right">
            <div class="player-exposed" id="ai2-exposed"></div>
            <div class="ai-hand"></div>
            <div class="ai-name">玩家 2</div>
        </div>

        <!-- AI玩家1 (位置:左) -->
        <div class="ai-player ai-left">
            <div class="player-exposed" id="ai1-exposed"></div>
            <div class="ai-hand"></div>
            <div class="ai-name">玩家 1</div>
        </div>

        <!-- 玩家手牌 -->
        <div class="player-area">
            <div class="player-exposed" id="player-exposed"></div>
            <div class="player-hand" id="player-hand"></div>
            <div class="player-actions">
                <button id="chi-btn" class="action-btn" disabled>吃</button>
                <button id="peng-btn" class="action-btn" disabled>碰</button>
                <button id="gang-btn" class="action-btn" disabled>杠</button>
                <button id="hu-btn" class="action-btn" disabled>胡</button>
                <button id="pass-btn" class="action-btn" disabled>过</button>
            </div>
        </div>

        </audio>

        <!-- 调试面板 -->
        <div class="debug-panel" id="debug-panel" style="display: none;">
            <div class="debug-header">
                <span>调试面板</span>
                <button id="close-debug-btn">&times;</button>
            </div>
            <div class="debug-content">
                <div class="debug-section">
                    <h4>游戏状态</h4>
                    <div id="debug-game-state"></div>
                </div>
                <div class="debug-section">
                    <h4>AI手牌 (作弊模式)</h4>
                    <div class="debug-toggle">
                        <label>
                            <input type="checkbox" id="show-ai-hands">
                            显示AI手牌
                        </label>
                    </div>
                </div>
                <div class="debug-section">
                    <h4>操作</h4>
                    <button id="debug-new-game" class="debug-btn">新游戏</button>
                    <button id="debug-auto-play" class="debug-btn">自动出牌</button>
                </div>
            </div>
        </div>

        <!-- 调试按钮 -->
        <button id="debug-toggle-btn" class="debug-toggle-btn" title="调试">🐛</button>
    </div>

    <script src="js/mahjong.js"></script>
    <script src="js/game.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/controller.js"></script>
    <script>
        // 页面加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            const controller = new GameController();
            controller.init();
            // 暴露给全局，供测试使用
            window.gameController = controller;
        });
    </script>
</body>
</html>
